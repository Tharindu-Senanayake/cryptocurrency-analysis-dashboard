name: Daily Crypto Pipeline

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC = 10am AEST / 11am AEDT
  workflow_dispatch:        # allow manual run from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push data commits back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch daily snapshot
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
        run: python tools/crypto_daily_snapshot.py

      - name: Build star-schema tables
        run: python tools/build_tables.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "data: daily snapshot $(date -u +%Y-%m-%d)"
          git push origin main
